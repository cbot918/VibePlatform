<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibePlatform - Auth Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 40px;
      width: 360px;
      text-align: center;
    }
    h1 { font-size: 20px; color: #111; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 32px; }
    .avatar { width: 72px; height: 72px; border-radius: 50%; margin-bottom: 16px; }
    .user-name { font-size: 18px; font-weight: 600; color: #111; }
    .user-login { color: #888; font-size: 13px; margin: 4px 0 8px; }
    .user-email { color: #555; font-size: 13px; margin-bottom: 24px; }
    .badge {
      display: inline-block;
      background: #e6ffed;
      color: #2da44e;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-github {
      background: #24292f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }
    .btn-logout { background: #f5f5f5; color: #555; border: 1px solid #e0e0e0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #24292f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-title { font-size: 11px; color: #aaa; margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <p style="color:#aaa">Loading...</p>
  </div>

  <script>
    const card = document.getElementById('card');

    function renderLoggedIn(user) {
      card.innerHTML = `
        <img class="avatar" src="${user.avatar_url}" alt="avatar" />
        <div class="user-name">${user.name || user.login}</div>
        <div class="user-login">@${user.login}</div>
        ${user.email ? `<div class="user-email">${user.email}</div>` : ''}
        <div class="badge">已登入 GitHub</div>
        <button class="btn-logout" onclick="logout()">登出</button>
      `;
    }

    function renderLoggedOut() {
      card.innerHTML = `
        <h1>VibePlatform</h1>
        <p class="subtitle">Auth 測試頁面</p>
        <p class="section-title">使用 GitHub 帳號登入</p>
        <a href="/auth/github" style="text-decoration:none">
          <button class="btn-github">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            Login with GitHub
          </button>
        </a>
      `;
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
      checkAuth();
    }

    async function checkAuth() {
      try {
        const res = await fetch('/auth/me', { credentials: 'include' });
        if (res.ok) {
          renderLoggedIn(await res.json());
        } else {
          renderLoggedOut();
        }
      } catch {
        renderLoggedOut();
      }
    }

    checkAuth();
  </script>
</body>
</html>
